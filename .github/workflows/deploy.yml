name: Deploy GRIXI to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 9f03d559ba7dab48269e40938b495350

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec react-router typegen && npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Health Check
        if: success()
        run: |
          sleep 10
          STATUS=$(curl -sf https://grixi.ai/api/health | jq -r '.status' || echo "unreachable")
          echo "Health: $STATUS"
          if [ "$STATUS" != "ok" ] && [ "$STATUS" != "degraded" ]; then
            echo "⚠️ Health check returned: $STATUS"
          fi
